<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campañas — InfluConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="index.html">
                <i class="fas fa-bolt"></i>InfluConnect
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars" style="color: var(--text-secondary);"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-1">
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html"><i class="fas fa-home me-1"></i>Inicio</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="clientes.html"><i class="fas fa-users me-1"></i>Clientes</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom active" href="campanas.html"><i class="fas fa-bullhorn me-1"></i>Campañas</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="productos.html"><i class="fas fa-box me-1"></i>Productos</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="testimonios.html"><i class="fas fa-star me-1"></i>Testimonios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-wrapper">
        <div class="container">
            <div class="page-header">
                <h1><i class="fas fa-bullhorn"></i> Gestión de Campañas</h1>
                <p>Administra las campañas publicitarias del influencer</p>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar campañas..." onkeyup="filterTable()">
                </div>
                <button class="btn-add" onclick="openModal()">
                    <i class="fas fa-plus"></i> Agregar Campaña
                </button>
            </div>

            <div class="table-container">
                <div id="tableContent">
                    <div class="loading-overlay"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CREATE/EDIT -->
    <div class="modal fade modal-custom" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-bullhorn"></i> <span id="modalTitle">Nueva Campaña</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="entityForm">
                        <input type="hidden" id="entityId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Nombre de la Campaña</label>
                                <input type="text" class="form-control form-control-custom" id="nombre" placeholder="Ej: Lanzamiento Verano 2026" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Plataforma</label>
                                <select class="form-select form-select-custom" id="plataforma" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="Instagram">Instagram</option>
                                    <option value="TikTok">TikTok</option>
                                    <option value="YouTube">YouTube</option>
                                    <option value="Twitter">Twitter</option>
                                    <option value="Facebook">Facebook</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label form-label-custom">Descripción</label>
                                <textarea class="form-control form-control-custom" id="descripcion" rows="3" placeholder="Describe los objetivos de la campaña..."></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-custom">Fecha de Inicio</label>
                                <input type="date" class="form-control form-control-custom" id="fechaInicio" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-custom">Fecha de Fin</label>
                                <input type="date" class="form-control form-control-custom" id="fechaFin" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-custom">Presupuesto (USD)</label>
                                <input type="number" step="0.01" class="form-control form-control-custom" id="presupuesto" placeholder="0.00" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveEntity()"><i class="fas fa-save me-1"></i>Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DELETE -->
    <div class="modal fade modal-custom delete-modal" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body pt-4 pb-2">
                    <div class="delete-icon">
                        <i class="fas fa-trash-alt"></i>
                    </div>
                    <h5>¿Eliminar campaña?</h5>
                    <p>Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer justify-content-center border-0 pt-0">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-delete-confirm" id="confirmDeleteBtn"><i class="fas fa-trash me-1"></i>Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/campanas.js"></script>
</body>
</html>
