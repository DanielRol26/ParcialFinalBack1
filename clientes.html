<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes — InfluConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="index.html">
                <i class="fas fa-bolt"></i>InfluConnect
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars" style="color: var(--text-secondary);"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-1">
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html"><i class="fas fa-home me-1"></i>Inicio</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom active" href="clientes.html"><i class="fas fa-users me-1"></i>Clientes</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="campanas.html"><i class="fas fa-bullhorn me-1"></i>Campañas</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="productos.html"><i class="fas fa-box me-1"></i>Productos</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="testimonios.html"><i class="fas fa-star me-1"></i>Testimonios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-wrapper">
        <div class="container">
            <div class="page-header">
                <h1><i class="fas fa-users"></i> Gestión de Clientes</h1>
                <p>Administra la base de clientes registrados del influencer</p>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar clientes..." onkeyup="filterTable()">
                </div>
                <button class="btn-add" onclick="openModal()">
                    <i class="fas fa-plus"></i> Agregar Cliente
                </button>
            </div>

            <div class="table-container">
                <div id="tableContent">
                    <div class="loading-overlay"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CREATE/EDIT -->
    <div class="modal fade modal-custom" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-plus"></i> <span id="modalTitle">Nuevo Cliente</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="entityForm">
                        <input type="hidden" id="entityId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Nombre</label>
                                <input type="text" class="form-control form-control-custom" id="nombre" placeholder="Ej: María" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Apellido</label>
                                <input type="text" class="form-control form-control-custom" id="apellido" placeholder="Ej: García" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Email</label>
                                <input type="email" class="form-control form-control-custom" id="email" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Teléfono</label>
                                <input type="text" class="form-control form-control-custom" id="telefono" placeholder="+57 300 123 4567">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Ciudad</label>
                                <input type="text" class="form-control form-control-custom" id="ciudad" placeholder="Ej: Medellín">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-custom">Fecha de Registro</label>
                                <input type="date" class="form-control form-control-custom" id="fechaRegistro">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveEntity()"><i class="fas fa-save me-1"></i>Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DELETE -->
    <div class="modal fade modal-custom delete-modal" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body pt-4 pb-2">
                    <div class="delete-icon">
                        <i class="fas fa-trash-alt"></i>
                    </div>
                    <h5>¿Eliminar cliente?</h5>
                    <p>Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer justify-content-center border-0 pt-0">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-delete-confirm" id="confirmDeleteBtn"><i class="fas fa-trash me-1"></i>Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/clientes.js"></script>
</body>
</html>
